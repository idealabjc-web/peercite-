<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer|PeerCite Publishers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --dark: #1a1a2e;
            --white: #ffffff;
            --gray-100: #f3f4f6;
            --gray-500: #6b7280;
            --gray-700: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Bar */
        .flipbook-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.5rem;
            background: rgba(15, 15, 26, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-left a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .topbar-left a:hover {
            opacity: 0.8;
        }

        .topbar-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            max-width: 350px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .topbar-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .topbar-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
        }

        .topbar-btn.primary:hover {
            background: var(--primary-dark);
        }

        /* Book Viewer Area */
        .book-viewer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Book Container */
        .book {
            display: flex;
            perspective: 2000px;
            position: relative;
        }

        .book-shadow {
            position: absolute;
            bottom: -20px;
            left: 5%;
            right: 5%;
            height: 30px;
            background: radial-gradient(ellipse, rgba(0, 0, 0, 0.5) 0%, transparent 70%);
            filter: blur(8px);
        }

        /* Page Styles */
        .page-side {
            width: 420px;
            height: 580px;
            background: var(--white);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-side canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .page-left {
            border-radius: 4px 0 0 4px;
            box-shadow: inset -8px 0 20px rgba(0, 0, 0, 0.12), -4px 4px 20px rgba(0, 0, 0, 0.3);
        }

        .page-right {
            border-radius: 0 4px 4px 0;
            box-shadow: inset 8px 0 20px rgba(0, 0, 0, 0.08), 4px 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Spine */
        .book-spine {
            width: 6px;
            background: linear-gradient(90deg, #c4a265, #d4b478, #c4a265);
            box-shadow: 0 0 12px rgba(196, 162, 101, 0.3);
            z-index: 2;
        }

        /* Page fold/gradient effect */
        .page-left::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.08), transparent);
            pointer-events: none;
        }

        .page-right::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.06), transparent);
            pointer-events: none;
            z-index: 1;
        }

        /* Page number overlays */
        .page-number {
            position: absolute;
            bottom: 12px;
            font-size: 0.72rem;
            color: rgba(0, 0, 0, 0.35);
            font-weight: 500;
            z-index: 2;
        }

        .page-left .page-number {
            left: 16px;
        }

        .page-right .page-number {
            right: 16px;
        }

        /* Flip animation */
        .page-side.flipping {
            animation: pageFlip 0.5s ease;
        }

        @keyframes pageFlip {
            0% {
                transform: rotateY(0);
            }

            40% {
                transform: rotateY(-8deg);
            }

            100% {
                transform: rotateY(0);
            }
        }

        /* Empty page placeholder */
        .page-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ccc;
            gap: 0.5rem;
        }

        .page-empty i {
            font-size: 2.5rem;
            opacity: 0.3;
        }

        .page-empty span {
            font-size: 0.8rem;
            opacity: 0.4;
        }

        /* Navigation Arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--white);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .nav-arrow:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-50%) scale(1.05);
        }

        .nav-arrow:disabled {
            opacity: 0.15;
            cursor: default;
            background: transparent;
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-50%);
        }

        .nav-arrow.prev {
            left: 1.5rem;
        }

        .nav-arrow.next {
            right: 1.5rem;
        }

        /* Bottom Bar */
        .flipbook-bottombar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.5rem;
            background: rgba(15, 15, 26, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            gap: 1rem;
        }

        .page-indicator {
            font-size: 0.82rem;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .page-input {
            width: 45px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--white);
            padding: 0.25rem;
            border-radius: 4px;
            font-size: 0.82rem;
            font-family: inherit;
        }

        .page-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .share-link {
            font-size: 0.75rem;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-left: 0.5rem;
        }

        .share-link:hover {
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--primary);
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 200;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            z-index: 50;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.82rem;
            color: var(--gray-500);
        }

        /* Single-page mode for mobile */
        @media (max-width:900px) {
            .page-side {
                width: 340px;
                height: 470px;
            }

            .book-viewer {
                padding: 1rem 0.5rem;
            }

            .nav-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .nav-arrow.prev {
                left: 0.5rem;
            }

            .nav-arrow.next {
                right: 0.5rem;
            }
        }

        @media (max-width:720px) {
            .page-left {
                display: none;
            }

            .book-spine {
                display: none;
            }

            .page-right {
                border-radius: 6px;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            }

            .page-right::before {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="flipbook-topbar">
        <div class="topbar-left">
            <a href="index.html"><i class='bx bx-arrow-back'></i> Back</a>
            <span class="topbar-title" id="docTitle">Loading...</span>
        </div>
        <div class="topbar-right">
            <a class="topbar-btn" id="downloadBtn" download><i class='bx bx-download'></i> Download</a>
            <button class="topbar-btn primary" id="shareBtn"><i class='bx bx-link'></i> Copy Link</button>
        </div>
    </div>

    <div class="book-viewer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <span class="loading-text">Loading document...</span>
        </div>

        <button class="nav-arrow prev" id="prevBtn" disabled><i class='bx bx-chevron-left'></i></button>

        <div class="book" id="book">
            <div class="page-side page-left" id="pageLeft">
                <canvas id="canvasLeft"></canvas>
                <div class="page-number" id="pageNumLeft"></div>
            </div>
            <div class="book-spine"></div>
            <div class="page-side page-right" id="pageRight">
                <canvas id="canvasRight"></canvas>
                <div class="page-number" id="pageNumRight"></div>
            </div>
            <div class="book-shadow"></div>
        </div>

        <button class="nav-arrow next" id="nextBtn"><i class='bx bx-chevron-right'></i></button>
    </div>

    <div class="flipbook-bottombar">
        <span class="page-indicator">
            Page <input type="number" class="page-input" id="pageInput" value="1" min="1">
            of <span id="pageCount">-</span>
        </span>
        <span class="share-link" id="copyPageLink"><i class='bx bx-link'></i> Copy page link</span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Parse hash: #assets/pdfs/WL-WH/file.pdf-p1
        function parseHash() {
            const hash = window.location.hash.slice(1); // remove #
            const match = hash.match(/^(.+\.pdf)-p(\d+)$/i);
            if (match) return { pdf: match[1], page: parseInt(match[2]) };
            // fallback: just a pdf path without page
            if (hash.endsWith('.pdf')) return { pdf: hash, page: 1 };
            return { pdf: null, page: 1 };
        }

        const { pdf: pdfPath, page: startPage } = parseHash();
        let currentSpread = 0;
        let totalPages = 0;
        let pdfDoc = null;
        let rendering = false;

        const pageLeftEl = document.getElementById('pageLeft');
        const pageRightEl = document.getElementById('pageRight');
        const canvasLeft = document.getElementById('canvasLeft');
        const canvasRight = document.getElementById('canvasRight');
        const ctxLeft = canvasLeft.getContext('2d');
        const ctxRight = canvasRight.getContext('2d');
        const pageNumLeft = document.getElementById('pageNumLeft');
        const pageNumRight = document.getElementById('pageNumRight');

        function getTitle(path) {
            if (!path) return 'Document';
            return path.split('/').pop().replace(/\.pdf$/i, '').replace(/[-_]/g, ' ');
        }
        document.getElementById('docTitle').textContent = getTitle(pdfPath);
        document.getElementById('downloadBtn').href = pdfPath || '#';

        // Simple spread: spread 0 = pages 1,2 | spread 1 = pages 3,4 | etc.
        function getSpreadPages(spread) {
            const left = spread * 2 + 1;
            const right = spread * 2 + 2;
            return {
                left: left <= totalPages ? left : null,
                right: right <= totalPages ? right : null
            };
        }

        function getTotalSpreads() {
            return Math.ceil(totalPages / 2);
        }

        function pageToSpread(pageNum) {
            return Math.floor((pageNum - 1) / 2);
        }

        // Build clean hash URL
        function buildHash(page) {
            return '#' + pdfPath + '-p' + page;
        }

        // Render one page onto a canvas
        async function renderPage(pageNum, canvas, ctx, sideEl, numEl) {
            if (!pageNum) {
                canvas.style.display = 'none';
                numEl.textContent = '';
                return;
            }

            canvas.style.display = 'block';
            const page = await pdfDoc.getPage(pageNum);
            const cw = sideEl.clientWidth || 420;
            const ch = sideEl.clientHeight || 580;
            const uv = page.getViewport({ scale: 1 });
            const scale = Math.min(cw / uv.width, ch / uv.height) * 0.95;
            const dpr = window.devicePixelRatio || 1;
            const viewport = page.getViewport({ scale: scale * dpr });

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = (viewport.width / dpr) + 'px';
            canvas.style.height = (viewport.height / dpr) + 'px';

            await page.render({ canvasContext: ctx, viewport }).promise;
            numEl.textContent = pageNum;
        }

        async function renderSpread(spread, direction) {
            if (rendering || !pdfDoc) return;
            rendering = true;

            const { left, right } = getSpreadPages(spread);

            if (direction) {
                const flipEl = direction === 'next' ? pageRightEl : pageLeftEl;
                flipEl.classList.add('flipping');
                setTimeout(() => flipEl.classList.remove('flipping'), 500);
            }

            await Promise.all([
                renderPage(left, canvasLeft, ctxLeft, pageLeftEl, pageNumLeft),
                renderPage(right, canvasRight, ctxRight, pageRightEl, pageNumRight)
            ]);

            const displayPage = right || left || 1;
            document.getElementById('pageInput').value = displayPage;
            document.getElementById('prevBtn').disabled = (spread <= 0);
            document.getElementById('nextBtn').disabled = (spread >= getTotalSpreads() - 1);

            // Update URL hash
            window.history.replaceState({}, '', buildHash(displayPage));

            rendering = false;
        }

        // Navigation
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentSpread > 0) { currentSpread--; renderSpread(currentSpread, 'prev'); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentSpread < getTotalSpreads() - 1) { currentSpread++; renderSpread(currentSpread, 'next'); }
        });
        document.getElementById('pageInput').addEventListener('change', (e) => {
            let p = parseInt(e.target.value);
            if (pdfDoc && p >= 1 && p <= totalPages) {
                currentSpread = pageToSpread(p);
                renderSpread(currentSpread);
            } else {
                const sp = getSpreadPages(currentSpread);
                e.target.value = sp.right || sp.left;
            }
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                if (currentSpread > 0) { currentSpread--; renderSpread(currentSpread, 'prev'); }
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                if (currentSpread < getTotalSpreads() - 1) { currentSpread++; renderSpread(currentSpread, 'next'); }
                if (e.key === ' ') e.preventDefault();
            }
        });

        // Copy link
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        function getPageURL() {
            const sp = getSpreadPages(currentSpread);
            const pg = sp.right || sp.left || 1;
            return window.location.origin + '/viewer.html' + buildHash(pg);
        }
        document.getElementById('shareBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(getPageURL()).then(() => showToast('Link copied!'));
        });
        document.getElementById('copyPageLink').addEventListener('click', () => {
            navigator.clipboard.writeText(getPageURL()).then(() => showToast('Page link copied!'));
        });

        // Load PDF
        if (pdfPath) {
            pdfjsLib.getDocument(pdfPath).promise.then(pdf => {
                pdfDoc = pdf;
                totalPages = pdf.numPages;
                document.getElementById('pageCount').textContent = totalPages;
                document.getElementById('pageInput').max = totalPages;
                document.getElementById('loadingOverlay').style.display = 'none';

                currentSpread = pageToSpread(startPage > totalPages ? 1 : startPage);
                renderSpread(currentSpread);
            }).catch(err => {
                document.getElementById('loadingOverlay').innerHTML =
                    '<i class="bx bx-error-circle" style="font-size:3rem;color:#ef4444"></i>' +
                    '<span class="loading-text">Failed to load document</span>';
                console.error(err);
            });
        } else {
            document.getElementById('loadingOverlay').innerHTML =
                '<i class="bx bx-file-find" style="font-size:3rem;color:var(--gray-500)"></i>' +
                '<span class="loading-text">No document specified</span>';
        }

        window.addEventListener('resize', () => { if (pdfDoc) renderSpread(currentSpread); });
    </script>
</body>

</html>
