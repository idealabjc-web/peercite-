<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer | PeerCite Publishers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --dark: #0f0f1a;
            --white: #ffffff;
            --gray-100: #f3f4f6;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --topbar-height: 56px;
            --bottombar-height: 52px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar styling */
        .viewer-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: var(--topbar-height);
            background: rgba(15, 15, 26, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            max-width: 50%;
        }

        .topbar-left a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .topbar-left a:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-2px);
        }

        .topbar-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .topbar-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--white);
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s ease;
            text-decoration: none;
            font-family: inherit;
        }

        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .topbar-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
        }

        .topbar-btn.primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        /* High Fidelity Viewer Frame Container */
        .viewer-content {
            flex: 1;
            width: 100%;
            position: relative;
            background-color: #111122;
            overflow: hidden;
        }

        .pdf-frame-wrapper {
            width: 100%;
            height: 100%;
            display: block;
        }

        .pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #111122;
        }

        /* Bottom Glassmorphic Controls */
        .viewer-bottombar {
            display: flex;
            align-items: center;
            justify-content: center;
            height: var(--bottombar-height);
            background: rgba(15, 15, 26, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            gap: 1.5rem;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--white);
            padding: 0.35rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .page-indicator {
            font-size: 0.82rem;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .page-input {
            width: 44px;
            text-align: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
            padding: 0.25rem 0;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .page-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
        }

        .share-link {
            font-size: 0.76rem;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-left: 0.75rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .share-link:hover {
            opacity: 0.85;
        }

        /* Loading Overlay styling */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111122;
            gap: 0.8rem;
            z-index: 150;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3.5px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.82rem;
            color: var(--gray-500);
            font-weight: 500;
        }

        /* Toast Component styling */
        .toast {
            position: fixed;
            bottom: 5.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--primary);
            color: var(--white);
            padding: 0.55rem 1.25rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 250;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive UI fixes */
        @media (max-width: 768px) {
            .viewer-topbar {
                padding: 0 1rem;
            }

            .topbar-btn span, 
            .topbar-left a span {
                display: none; /* Icon-only representation for small screens */
            }

            .topbar-left a {
                padding: 0.45rem;
            }

            .topbar-btn {
                padding: 0.45rem;
                width: 34px;
                height: 34px;
                justify-content: center;
                border-radius: 50%;
            }

            .topbar-title {
                max-width: 180px;
                font-size: 0.84rem;
            }

            .share-link {
                display: none; /* Keep clean bottom bar on mobile screens */
            }
        }
    </style>
</head>

<body>

    <!-- Sleek Glassmorphic Header Navigation -->
    <div class="viewer-topbar">
        <div class="topbar-left">
            <a href="index.html"><i class='bx bx-arrow-back'></i> <span>Back</span></a>
            <span class="topbar-title" id="docTitle">Loading...</span>
        </div>
        <div class="topbar-right">
            <a class="topbar-btn" id="downloadBtn" download><i class='bx bx-download'></i> <span>Download</span></a>
            <button class="topbar-btn primary" id="shareBtn"><i class='bx bx-link'></i> <span>Copy Link</span></button>
        </div>
    </div>

    <!-- Distraction-free browser-native viewing pane -->
    <div class="viewer-content">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <span class="loading-text">Loading publication...</span>
        </div>

        <div class="pdf-frame-wrapper">
            <iframe id="pdfIframe" class="pdf-iframe" title="PDF Document Viewer"></iframe>
        </div>
    </div>

    <!-- Unified Glassmorphic Footer Controls -->
    <div class="viewer-bottombar">
        <button class="nav-btn" id="prevBtn" disabled>
            <i class='bx bx-chevron-left'></i> <span>Prev</span>
        </button>

        <span class="page-indicator">
            Page <input type="number" class="page-input" id="pageInput" value="1" min="1">
            of <span id="pageCount">-</span>
        </span>

        <button class="nav-btn" id="nextBtn" disabled>
            <span>Next</span> <i class='bx bx-chevron-right'></i>
        </button>

        <span class="share-link" id="copyPageLink"><i class='bx bx-link'></i> Copy Page Link</span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Setup PDF.js for dynamic metadata reading
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Parse hash: #assets/pdfs/WL-WH/file.pdf-p1
        function parseHash() {
            const hash = window.location.hash.slice(1); // remove #
            const match = hash.match(/^(.+\.pdf)-p(\d+)$/i);
            if (match) return { pdf: match[1], page: parseInt(match[2]) };
            
            // fallback: check simple pdf path hash
            if (hash.endsWith('.pdf')) return { pdf: hash, page: 1 };
            return { pdf: null, page: 1 };
        }

        const { pdf: pdfPath, page: startPage } = parseHash();
        const pdfIframe = document.getElementById('pdfIframe');
        let currentPage = startPage || 1;
        let totalPages = 0;

        function getTitle(path) {
            if (!path) return 'Document';
            return path.split('/').pop().replace(/\.pdf$/i, '').replace(/[-_]/g, ' ');
        }

        // Title and download button setup
        document.getElementById('docTitle').textContent = getTitle(pdfPath);
        document.getElementById('downloadBtn').href = pdfPath || '#';

        // Generate clean URL Hash syntax
        function buildHash(page) {
            return '#' + pdfPath + '-p' + page;
        }

        // Trigger sync of page inputs and URL hashes
        function updatePage(page) {
            if (page < 1) page = 1;
            if (totalPages > 0 && page > totalPages) page = totalPages;
            
            currentPage = page;
            document.getElementById('pageInput').value = currentPage;
            
            // Re-bind source layout targets using native page params
            const targetUrl = pdfPath + '#page=' + currentPage;
            
            // Avoid unnecessary page reload loops if source didn't change
            if (pdfIframe.src !== window.location.origin + '/' + targetUrl && 
                pdfIframe.src !== targetUrl) {
                pdfIframe.src = targetUrl;
            }

            // Sync URL hash without triggering full reload
            window.history.replaceState(null, '', buildHash(currentPage));

            // Sync button disabled states
            document.getElementById('prevBtn').disabled = (currentPage <= 1);
            document.getElementById('nextBtn').disabled = (totalPages > 0 && currentPage >= totalPages);
        }

        // Lightweight dynamic metadata check to load total page numbers safely in the background
        if (pdfPath) {
            // Load native iframe viewer immediately
            pdfIframe.src = pdfPath + '#page=' + currentPage;
            pdfIframe.onload = function() {
                document.getElementById('loadingOverlay').style.display = 'none';
            };

            // Query metadata to supply exact total pages
            pdfjsLib.getDocument(pdfPath).promise.then(pdf => {
                totalPages = pdf.numPages;
                document.getElementById('pageCount').textContent = totalPages;
                document.getElementById('pageInput').max = totalPages;
                
                // Recheck buttons now that pages are verified
                updatePage(currentPage);
            }).catch(err => {
                console.warn("Failed to load PDF metadata page numbers: ", err);
                // Graceful fallback - hide loader immediately, let native iframe run with no restriction
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('pageCount').textContent = '1+';
                document.getElementById('prevBtn').disabled = false;
                document.getElementById('nextBtn').disabled = false;
            });
        } else {
            document.getElementById('loadingOverlay').innerHTML =
                '<i class="bx bx-file-find" style="font-size:3rem;color:var(--gray-500)"></i>' +
                '<span class="loading-text">No publication specified</span>';
        }

        // Bottom Controls Navigation events
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) updatePage(currentPage - 1);
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (totalPages === 0 || currentPage < totalPages) updatePage(currentPage + 1);
        });
        document.getElementById('pageInput').addEventListener('change', (e) => {
            let p = parseInt(e.target.value);
            if (!isNaN(p)) {
                updatePage(p);
            } else {
                e.target.value = currentPage;
            }
        });

        // Key bindings for keyboard nav (ArrowLeft/ArrowRight)
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                if (currentPage > 1) updatePage(currentPage - 1);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                if (totalPages === 0 || currentPage < totalPages) updatePage(currentPage + 1);
            }
        });

        // Link copy logic and toasts
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; 
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function getPageURL() {
            return window.location.origin + window.location.pathname + buildHash(currentPage);
        }

        document.getElementById('shareBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(getPageURL())
                .then(() => showToast('Share link copied to clipboard!'))
                .catch(() => showToast('Failed to copy share link'));
        });

        document.getElementById('copyPageLink').addEventListener('click', () => {
            navigator.clipboard.writeText(getPageURL())
                .then(() => showToast('Page link copied successfully!'))
                .catch(() => showToast('Failed to copy page link'));
        });
    </script>
</body>

</html>
